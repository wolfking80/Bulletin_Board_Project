<!DOCTYPE html>
<html>

<body style="margin: 0; padding: 0; font-family: sans-serif; background-color: #f8f9fa;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px;">
    <tr>
      <td align="center">
        <table width="600"
          style="background: #ffffff; border: 1px solid #dee2e6; border-radius: 10px; overflow: hidden;">
          <!-- Шапка (Header) -->
          <tr>
            <td
              style="background: {% block header_bg %}#007bff{% endblock %}; padding: 20px; text-align: center; color: white;">
              <h2 style="margin: 0;">{% block header_title %}{{ site_name }}{% endblock %}</h2>
            </td>
          </tr>
          <!-- Контент (Body) -->
          <tr>
            <td style="padding: 30px; color: #333; line-height: 1.5;">
              <p>Здравствуйте, <b>{{ user.username }}</b>!</p>
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Подвал (Footer) -->
          <tr>
            <td style="padding: 20px; text-align: center; font-size: 12px; color: #6c757d; background: #f1f3f5;">
              &copy; {{ year }} {{ site_name }}. Все права защищены.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
