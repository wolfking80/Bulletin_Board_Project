<!DOCTYPE html>
<html>

<body style="margin: 0; padding: 0; font-family: sans-serif; background-color: #f8f9fa;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px;">
    <tr>
      <td align="center">
        <table width="600" style="background: #ffffff; border: 1px solid #dee2e6; border-radius: 10px;">
          <tr>
            <td
              style="background: #28a745; padding: 20px; text-align: center; color: white; border-radius: 10px 10px 0 0;">
              <h2 style="margin: 0;">Объявление опубликовано! ✅</h2>
            </td>
          </tr>
          <tr>
            <td style="padding: 30px; color: #333;">
              <p>Здравствуйте, <b>{{ user.username }}</b>!</p>
              <p>Ваше объявление <b>«{{ ad.title }}»</b> успешно прошло модерацию и теперь доступно всем пользователям
                сайта.</p>
              <div style="text-align: center; margin-top: 30px;">
                <a href="{{ protocol }}://{{ domain }}{% url 'ads:ad_details' ad.slug %}"
                  style="background: #007bff; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                  Посмотреть на сайте
                </a>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
